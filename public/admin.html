<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpesaSmart Admin | Secure Management</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .admin-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        .stat-card {
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border-glass);
            padding: 1.5rem;
            border-radius: 1.5rem;
            text-align: center;
            transition: transform 0.2s;
        }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-val {
            display: block;
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent-emerald);
        }
        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 0.5rem;
        }
        .table-container {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: 1.5rem;
            overflow: hidden;
            margin-top: 1.5rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 1.25rem;
            border-bottom: 1px solid var(--border-glass);
        }
        th {
            background: hsla(0,0%,100%,0.02);
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 0.05em;
        }
        tr:last-child td { border-bottom: none; }
        .action-btn {
            background: hsla(0,0%,100%,0.05);
            border: 1px solid var(--border-glass);
            color: white;
            padding: 0.5rem;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .action-btn:hover { background: hsla(0,0%,100%,0.1); }
        
        #login-form {
            max-width: 420px;
            margin: 6rem auto;
            padding: 3rem;
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: 2rem;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.6s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        .form-group input {
            width: 100%;
            padding: 1rem;
            background: hsla(0,0%,100%,0.05);
            border: 1px solid var(--border-glass);
            border-radius: 1rem;
            color: white;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-group input:focus { border-color: var(--accent-emerald); }
        .btn {
            background: var(--accent-emerald);
            color: black;
            border: none;
            padding: 1.25rem;
            border-radius: 1rem;
            cursor: pointer;
            width: 100%;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: transform 0.2s, opacity 0.2s;
        }
        .btn:hover { transform: scale(1.02); }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .hidden { display: none !important; }
        h2 { font-size: 1.5rem; font-weight: 800; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <header>
        <div style="max-width: 1000px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between;">
            <div style="font-weight: 800; font-size: 1.5rem; letter-spacing: -0.02em;">SpesaSmart <span style="color: var(--accent-emerald)">Admin</span></div>
            <a href="index.html" style="font-size: 0.9rem; color: var(--text-secondary); text-decoration: none; font-weight: 600;">
                <i data-lucide="external-link" size="14" style="vertical-align: middle; margin-right: 0.5rem;"></i>
                Back to Site
            </a>
        </div>
    </header>

    <main style="max-width: 1000px; margin: 3rem auto; padding: 0 1rem;">
        <!-- Auth View -->
        <div id="auth-container">
            <form id="login-form">
                <div style="text-align: center; margin-bottom: 2rem;">
                    <div style="background: hsla(142, 70%, 50%, 0.1); width: 60px; height: 60px; border-radius: 1.5rem; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
                        <i data-lucide="shield-check" size="30" style="color: var(--accent-emerald);"></i>
                    </div>
                    <h2>Secure Login</h2>
                    <p style="color: var(--text-secondary); font-size: 0.9rem;">Sign in to access Milan Price Engine</p>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="admin@spesasmart.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn" id="login-btn">Authorize Access</button>
                <p id="error-msg" style="color: var(--alert-red); font-size: 0.8rem; text-align: center; margin-top: 1rem;" class="hidden"></p>
            </form>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard-container" class="hidden">
            <div class="admin-nav">
                <h2>Database Health</h2>
                <button id="logout-btn" style="color: var(--alert-red); background: hsla(0, 84%, 60%, 0.1); border: 1px solid hsla(0, 84%, 60%, 0.2); padding: 0.5rem 1rem; border-radius: 0.75rem; cursor: pointer; font-weight: 600;">
                    Logout
                </button>
            </div>

            <div class="stats-grid" id="stats-grid">
                <!-- Data Health stats -->
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 2rem;">
                <h2>Inventory Management</h2>
                <span style="font-size: 0.8rem; color: var(--text-secondary);">Latest price points</span>
            </div>
            <div class="table-container">
                <table id="inventory-table">
                    <thead>
                        <tr>
                            <th>Product Name</th>
                            <th>Retailer</th>
                            <th>Current Price</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="inventory-body"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/admin.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
