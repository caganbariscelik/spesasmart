<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpesaSmart | Milan Grocery Engine</title>
    <meta name="description" content="Premium grocery price comparison for Milan. Compare Lidl, Pam, Esselunga, and Conad.">
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Fonts: Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <header>
        <div class="hero-section">
            <h1>SpesaSmart</h1>
            <p>High-performance price comparison in Milan</p>
        </div>
        <div class="search-wrapper">
            <i data-lucide="search" size="24"></i>
            <input type="text" id="product-search" placeholder="What are you looking for today? (e.g. Pasta, Latte)..." autocomplete="off">
        </div>
    </header>

    <main id="app">
        <div id="results-container">
            <!-- Initial State -->
            <div style="text-align: center; margin-top: 6rem; animation: fadeIn 1s ease;">
                <div style="background: hsla(142, 70%, 50%, 0.1); width: 80px; height: 80px; border-radius: 2rem; display: flex; align-items: center; justify-content: center; margin: 0 auto 2rem;">
                    <i data-lucide="shopping-bag" size="40" style="color: var(--accent-emerald);"></i>
                </div>
                <h2 style="font-weight: 700; margin-bottom: 0.5rem;">Ready to save?</h2>
                <p style="color: var(--text-secondary);">Start typing above to compare 4,000+ local prices.</p>
            </div>
        </div>
    </main>

    <a href="admin.html" class="admin-badge">
        <i data-lucide="shield-check" size="16" style="vertical-align: middle; margin-right: 0.5rem;"></i>
        Admin
    </a>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
