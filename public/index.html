<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpesaSmart | Milan Grocery Engine</title>
    <meta name="description" content="Premium grocery price comparison for Milan. Compare Lidl, Pam, Esselunga, and Conad.">
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Fonts: Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <!-- Language Switcher -->
    <div class="lang-switcher">
        <button class="lang-btn active" data-lang="en" onclick="applyLanguage('en')">EN</button>
        <span class="lang-divider">|</span>
        <button class="lang-btn" data-lang="it" onclick="applyLanguage('it')">IT</button>
    </div>

    <header>
        <div class="hero-section">
            <h1>SpesaSmart</h1>
            <p>High-performance price comparison in Milan</p>
        </div>
        <div class="search-wrapper">
            <i data-lucide="search" size="24"></i>
            <input type="text" id="product-search" placeholder="What are you looking for? (e.g. Milk, Bread, Rice)..." autocomplete="off">
        </div>
    </header>

    <main id="app">
        <div id="results-container">
            <!-- Initial State rendered by JS -->
        </div>
    </main>

    <a href="admin.html" class="admin-badge">
        <i data-lucide="shield-check" size="16" style="vertical-align: middle; margin-right: 0.5rem;"></i>
        <span>Admin</span>
    </a>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <script>
        lucide.createIcons();
        renderInitialState();
    </script>
</body>
</html>
